version: "3.9"

services:

  users:
    build:
      context: ./users-service
    container_name: users-service
    ports:
      - "8001:8000"
    environment:
      - MONGO_URL=mongodb://admin:admin123@mongo:27017/?authSource=admin
      - SECRET_KEY=changeme-use-a-long-random-secret-in-production
      - SMTP_HOST=smtp.gmail.com
      - SMTP_PORT=587
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_USER}
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      mongo:
        condition: service_healthy

  product:
    build:
      context: ./product-service
    container_name: product-service
    ports:
      - "8002:8000"
    environment:
      - MONGO_URL=mongodb://admin:admin123@mongo:27017/?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy

  optimization:
    build:
      context: ./optimization-service
    container_name: optimization-service
    ports:
      - "8003:8000"
    environment:
      - USERS_SERVICE_URL=http://users:8000
      - PRODUCT_SERVICE_URL=http://product:8000
      - SECRET_KEY=changeme-use-a-long-random-secret-in-production
      - MONGO_URL=mongodb://admin:admin123@mongo:27017/?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy
      product:
        condition: service_started

  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_USERS_API=http://localhost:8001
      - VITE_PRODUCT_API=http://localhost:8002
      - VITE_OPTIMIZATION_API=http://localhost:8003
    depends_on:
      - users
      - product
      - optimization

  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin123
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok", "--username", "admin", "--password", "admin123", "--authenticationDatabase", "admin"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

networks:
  default:
    name: packaging-network

volumes:
  mongo_data: